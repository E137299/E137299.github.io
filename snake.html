<!DOCTYPE html>
<html>
<head>
    <title>Block Push Game</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #f0f0f0;
            text-align: center;
        }

        canvas {
            background-color: black;
            margin-top: 10px;
        }
    </style>
</head>

<body onload="startGame()">

    <div class = "navbar">
        <a href="index.html" class = "navlink">Home</a>
        <a href="resume.html" class = "navlink">Resume</a>
        <a href="photos.html" class = "navlink">Photo Gallery</a>
        <a href="geoquiz.html" class = "navlink">Geography Quiz</a>
        <a href="snake.html" class = "navlink">Snake Game</a>
    </div>

    <h2>Block Push Game</h2>
    <p>Push blocks by touching them. You can push up to 2 at once.</p>

    <canvas id="gameCanvas" width="500" height="500"></canvas>

    <script>
    const CONFIG = {
      PLAYER_SIZE: 30,
      BLOCK_SIZE: 40,
      SPEED: 5,
      MAX_PUSHED_BLOCKS: 2,
      CANVAS_WIDTH: 500,
      CANVAS_HEIGHT: 500,
    };

    class Entity {
      constructor(x, y, size, color) {
        this.x = x;
        this.y = y;
        this.size = size;
        this.color = color;
      }

      draw(ctx) {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
      }

      moveBy(dx, dy) {
        this.x += dx;
        this.y += dy;
      }
    }

    class Player extends Entity {
      constructor(x, y) {
        super(x, y, CONFIG.PLAYER_SIZE, "blue");
      }
    }

    class Block extends Entity {
      constructor(x, y) {
        super(x, y, CONFIG.BLOCK_SIZE, "red");
        this.deltaX = 5;
      }
    }

    class Game {
      constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext("2d");

        this.player = new Player(227, 100);

        this.apple = new Block(50, 50);

        this.bindControls();

        while (true){
          this.apple.moveBy(this.deltaX, 0);
        }
        this.draw();
      }

      bindControls() {
        document.addEventListener("keydown", (e) => {
          if (e.key === "ArrowUp") this.tryMove(0, -CONFIG.SPEED);
          if (e.key === "ArrowDown") this.tryMove(0, CONFIG.SPEED);
          if (e.key === "ArrowLeft") this.tryMove(-CONFIG.SPEED, 0);
          if (e.key === "ArrowRight") this.tryMove(CONFIG.SPEED, 0);
        });
      }

      isColliding(aX, aY, aSize, bX, bY, bSize) {
        return (
          aX < bX + bSize &&
          aX + aSize > bX &&
          aY < bY + bSize &&
          aY + aSize > bY
        );
      }

      isInsideBounds(x, y, size) {
        return (
          x >= 0 &&
          y >= 0 &&
          x + size <= this.canvas.width &&
          y + size <= this.canvas.height
        );
      }

      getTouchingBlocks(newPlayerX, newPlayerY) {
        const touching = [];
        for (const block of this.blocks) {
          if (this.isColliding(newPlayerX, newPlayerY, this.player.size, block.x, block.y, block.size)) {
            touching.push(block);
          }
        }
        return touching;
      }


      tryMove(dx, dy) {
        const newX = this.player.x + dx;
        const newY = this.player.y + dy;

        if (!this.isInsideBounds(newX, newY, this.player.size)) return;

        this.player.moveBy(dx, dy);
        this.draw();
      }

      draw() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.player.draw(this.ctx);
      }
    }

    window.addEventListener("load", () => {
      new Game("gameCanvas");
    });
  </script>

</body>
</html>
