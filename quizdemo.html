<!DOCTYPE html>
<html>
<head>
    <title>Javascript Demo - State Capital Quiz</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="index.html" class="navlink">Home</a>
        <a href="resume.html" class="navlink">Resume</a>
        <a href="photos.html" class="navlink">Photo Gallery</a>
        <a href="madlib.html" class="navlink">Mad Libs</a>
        <a href="blockgame.html" class="navlink">Block Game</a>
    </div>

    <!-- WELCOME SCREEN -->
    <div id="welcomeScreen" style="text-align: center;">
        <h1>Geography Quiz</h1>
        <p>
            Test your knowledge of U.S. state capitals!  
            You will be given a state, and your job is to type in its capital.
        </p>
        <button onclick="startQuiz()">Start Quiz</button>
    </div>

    <!-- QUIZ CONTENT (hidden at start) -->
    <div id="quizContainer" style="text-align: center; display: none;">
        
        <h2 id="question"></h2>

        <input id="answerInput" type="text" placeholder="Enter your answer">

        <br><br>

        <button onclick="checkAnswer()">Submit Answer</button>

        <p id="feedback"></p>

        <p id="score">Correct Answers: 0</p>
    </div>

    <script>
        let quizData = [{state : "Texas", capital : "Austin"},
                        {state: "California", capital: "Sacramento"},
                        {state: "New York", capital: "Albany"},
                        {state: "Illinois", capital: "Springfield"}
        ];

        let currentQuestion = 0;
        let correctCount = 0;

        function loadQuestion(){
            let stateName = quizData[currentQuestion].state;
            document.getElementById("question").innerText = "What is the capital of " + stateName + "?";
        }

        function checkAnswer(){
            let correctAnswer = quizData[currentQuestion].capital;
            let userAnswer = document.getElementById("answerInput").value;

            if (userAnswer === correctAnswer){
                document.getElementById('feedback').innerText = "Correct!";
                correctCount++;
            }else{
                document.getElementById('feedback').innerText = "Incorrect. The correct answer is "+correctAnswer+".";
            }

            //Update the score
            document.getElementById('score').innerText = "Correct Answers: "+correctCount;

            //Clear input
            document.getElementById("answerInput").value = "Enter your answer";

            //Advance to next question
            currentQuestion++;
            if (currentQuestion < quizData.length){
                loadQuestion();
            }else{
                document.getElementById("question").innerText = "Quiz Complete!"
            }
        }

        function startQuiz(){
            document.getElementById("welcomeScreen").style.display = "none";
            document.getElementById("quizContainer").style.display = "block";
            loadQuestion();
        }



    </script>

</body>
</html>
